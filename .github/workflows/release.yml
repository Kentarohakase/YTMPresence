name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Setup Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

          $candidates = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          )

          $iscc = $candidates | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
          if (-not $iscc) {
            $command = Get-Command ISCC.exe -ErrorAction SilentlyContinue
            if ($command) {
              $iscc = $command.Source
            }
          }

          if (-not $iscc) {
            throw "ISCC.exe not found after installing Inno Setup."
          }

          "INNO_SETUP_COMPILER=$iscc" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $manifest = Get-Content -LiteralPath "YTMPresence/extension/manifest.json" -Raw | ConvertFrom-Json
          "value=$($manifest.version)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=v$($manifest.version)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Check tag matches manifest
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $expected = "${{ steps.version.outputs.tag }}"
          $actual = "${{ github.ref_name }}"
          if ($actual -ne $expected) {
            throw "Tag '$actual' does not match manifest version '$expected'."
          }

      - name: Package release
        shell: pwsh
        run: ./scripts/package-release.ps1 -InnoSetupCompiler "$env:INNO_SETUP_COMPILER"

      - name: Prepare release notes
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.value }}"
          $notesPath = "artifacts/release/GITHUB_RELEASE_NOTES.md"
          $changelog = Get-Content -LiteralPath "CHANGELOG.md" -Raw
          $pattern = "(?s)## \[$([regex]::Escape($version))\].*?(?=\r?\n## \[|\z)"
          $match = [regex]::Match($changelog, $pattern)

          if ($match.Success) {
            $notes = $match.Value.Trim()
          } else {
            $notes = "Release $version"
          }

          Set-Content -LiteralPath $notesPath -Value $notes -Encoding UTF8

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: YTMPresence-${{ steps.version.outputs.value }}-release
          path: |
            artifacts/release/YTMPresence-${{ steps.version.outputs.value }}-win-x64.zip
            artifacts/release/YTMPresence-${{ steps.version.outputs.value }}-win-x64-setup.exe
            artifacts/release/YTMPresence-extension.zip
            artifacts/release/SHA256SUMS.txt

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $version = "${{ steps.version.outputs.value }}"
          $bundle = "artifacts/release/YTMPresence-$version-win-x64.zip"
          $setup = "artifacts/release/YTMPresence-$version-win-x64-setup.exe"
          $extension = "artifacts/release/YTMPresence-extension.zip"
          $checksums = "artifacts/release/SHA256SUMS.txt"
          $notes = "artifacts/release/GITHUB_RELEASE_NOTES.md"

          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $bundle $setup $extension $checksums --repo $repo --clobber
            gh release edit $tag --repo $repo --title "YTMPresence $version" --notes-file $notes
          } else {
            gh release create $tag $bundle $setup $extension $checksums --repo $repo --target "${{ github.sha }}" --title "YTMPresence $version" --notes-file $notes
          }
