<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>YTM Presence Einstellungen</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #111111;
            --panel: #1a1a1a;
            --field: #242424;
            --line: #303030;
            --muted: #a9a9a9;
            --text: #f4f4f4;
            --red: #d92323;
            --green: #16a34a;
            --amber: #d97706;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 14px;
        }

        .page {
            max-width: 900px;
            margin: 0 auto;
            padding: 28px 20px 34px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 18px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 0;
        }

        h2 {
            margin: 0 0 14px;
            font-size: 16px;
            letter-spacing: 0;
        }

        .subtitle {
            margin-top: 5px;
            color: var(--muted);
        }

        .badge {
            min-width: 110px;
            padding: 7px 11px;
            border-radius: 999px;
            background: #2a2a2a;
            color: var(--muted);
            text-align: center;
            font-size: 12px;
            font-weight: 700;
        }

        .badge.ok {
            background: rgba(22, 163, 74, 0.16);
            color: #86efac;
        }

        .badge.warn {
            background: rgba(217, 119, 6, 0.16);
            color: #fbbf24;
        }

        .badge.err {
            background: rgba(217, 35, 35, 0.16);
            color: #fca5a5;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
            gap: 16px;
        }

        section {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            padding: 18px;
        }

        label {
            display: block;
            margin: 0 0 7px;
            color: #dedede;
            font-weight: 700;
        }

        input {
            width: 100%;
            min-height: 42px;
            border: 1px solid #3a3a3a;
            border-radius: 7px;
            background: var(--field);
            color: var(--text);
            padding: 10px 12px;
            font: inherit;
        }

        input:focus {
            border-color: var(--red);
            outline: 2px solid rgba(217, 35, 35, 0.24);
        }

        .field + .field {
            margin-top: 14px;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        button {
            min-height: 38px;
            border: 0;
            border-radius: 7px;
            background: #2f2f2f;
            color: var(--text);
            cursor: pointer;
            font: inherit;
            font-weight: 700;
            padding: 0 14px;
        }

        button.primary {
            background: var(--red);
        }

        button:disabled {
            cursor: wait;
            opacity: 0.65;
        }

        .rows {
            display: grid;
            gap: 10px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 10px;
        }

        .row span:first-child {
            color: var(--muted);
        }

        .row span:last-child {
            min-width: 0;
            overflow: hidden;
            text-align: right;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .message {
            min-height: 20px;
            margin-top: 14px;
            color: var(--muted);
        }

        .message.ok {
            color: #86efac;
        }

        .message.err {
            color: #fca5a5;
        }

        .privacy {
            margin-top: 14px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.45;
        }

        @media (max-width: 760px) {
            .layout {
                grid-template-columns: 1fr;
            }

            header {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <header>
            <div>
                <h1>YTM Presence</h1>
                <div id="subtitle" class="subtitle">Einstellungen werden geladen</div>
            </div>
            <div id="stateBadge" class="badge">...</div>
        </header>

        <div class="layout">
            <section>
                <h2>Companion</h2>

                <div class="field">
                    <label for="token">Security Token</label>
                    <input id="token" autocomplete="off" spellcheck="false" placeholder="Token aus dem Tray-Menü" />
                </div>

                <div class="field">
                    <label for="companionUrl">WebSocket URL</label>
                    <input id="companionUrl" spellcheck="false" placeholder="ws://127.0.0.1:17373/ws" />
                </div>

                <div class="actions">
                    <button id="save" class="primary">Speichern</button>
                    <button id="test">Verbindung testen</button>
                    <button id="resetUrl">Standard-URL</button>
                </div>

                <div id="msg" class="message"></div>
                <div class="privacy">YTMPresence speichert Token und URL lokal im Browser. Playback-Daten werden nur an den lokalen Companion auf deinem Rechner gesendet.</div>
            </section>

            <section>
                <h2>Status</h2>

                <div class="rows">
                    <div class="row">
                        <span>Companion</span>
                        <span id="connectionText">-</span>
                    </div>
                    <div class="row">
                        <span>Token</span>
                        <span id="tokenText">-</span>
                    </div>
                    <div class="row">
                        <span>Aktive URL</span>
                        <span id="activeUrlText">-</span>
                    </div>
                    <div class="row">
                        <span>Letzter Track</span>
                        <span id="lastTrackText">-</span>
                    </div>
                    <div class="row">
                        <span>Letztes Update</span>
                        <span id="lastUpdateText">-</span>
                    </div>
                </div>

                <div class="actions">
                    <button id="refresh">Aktualisieren</button>
                    <button id="openYtm">YT Music</button>
                </div>
            </section>
        </div>
    </div>

    <script src="options.js"></script>
</body>
</html>
