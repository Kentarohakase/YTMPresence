<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>YTM Bridge – Einstellungen</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            margin: 16px;
            max-width: 720px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            margin-top: 12px;
        }

        input {
            width: 100%;
            padding: 10px;
            font-size: 14px;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        button {
            margin-top: 10px;
            padding: 10px 14px;
            font-size: 14px;
        }

        .actions button {
            margin-top: 0;
        }

        button:disabled {
            cursor: wait;
            opacity: 0.7;
        }

        .hint {
            margin-top: 10px;
            color: #555;
        }

        .ok {
            margin-top: 10px;
            color: #0a7a2f;
        }

        .err {
            margin-top: 10px;
            color: #b00020;
        }
    </style>
</head>
<body>
    <h2>YTM Discord Presence Bridge</h2>

    <label for="token">Security Token</label>
    <input id="token" placeholder="Token aus Tray → 'Token kopieren' einfügen" />

    <label for="companionUrl">Companion WebSocket URL</label>
    <input id="companionUrl" placeholder="ws://127.0.0.1:17373/ws" />

    <div class="actions">
        <button id="save">Speichern</button>
        <button id="test">Verbindung testen</button>
    </div>

    <div class="hint">
        Tipp: Tray-App → Menü → „Token kopieren“. Die URL nur ändern, wenn du Port oder Pfad in den Settings geändert hast.
    </div>

    <div id="msg"></div>

    <script src="options.js"></script>
</body>
</html>
